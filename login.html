<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Login</title>

<link rel="stylesheet"
href="css/login.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="login-container">

<div class="login-card">

<div class="logo">

<i class="fa-solid fa-house-user"></i>

<h1>Lozada Family</h1>

<p>Welcome Back</p>

</div>

<form>

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
placeholder="Email Address">

</div>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
placeholder="Password">

</div>

<div class="options">

<label>

<input type="checkbox">

Remember Me

</label>

<a href="#">

Forgot Password?

</a>

</div>

<button>

Login

</button>

<div class="divider">

OR

</div>

<button
class="google">

<i class="fa-brands fa-google"></i>

Continue with Google

</button>

<p class="register">

Don't have an account?

<a href="register.html">

Create Account

</a>

</p>

</form>

</div>

</div>

</body>

</html>
