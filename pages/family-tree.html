<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Lozada Family Tree</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/family-tree.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <!-- HEADER -->

    <header class="page-header">

        <div class="header-left">

            <a href="../index.html" class="back-btn">

                <i class="fa-solid fa-arrow-left"></i>

            </a>

            <h1>

                <i class="fa-solid fa-tree"></i>

                Lozada Family Tree

            </h1>

        </div>

        <button class="add-member">

            <i class="fa-solid fa-user-plus"></i>

            Add Member

        </button>

    </header>

    <!-- TREE -->

    <section class="tree-wrapper">

        <!-- GRANDPARENTS -->

        <div class="generation">

            <div class="member-card">

                <div class="avatar">

                    <i class="fa-solid fa-user"></i>

                </div>

                <h3>Pedro Lozada</h3>

                <span>Grandfather</span>

            </div>

            <div class="member-card">

                <div class="avatar">

                    <i class="fa-solid fa-user"></i>

                </div>

                <h3>Maria Lozada</h3>

                <span>Grandmother</span>

            </div>

        </div>

        <div class="vertical-line"></div>

        <!-- PARENTS -->

        <div class="generation">

            <div class="member-card">

                <div class="avatar">

                    <i class="fa-solid fa-user-tie"></i>

                </div>

                <h3>Juan Lozada</h3>

                <span>Father</span>

            </div>

            <div class="member-card">

                <div class="avatar">

                    <i class="fa-solid fa-person-dress"></i>

                </div>

                <h3>Ana Lozada</h3>

                <span>Mother</span>

            </div>

        </div>

        <div class="vertical-line"></div>

        <!-- CHILDREN -->

        <div class="generation">

            <div class="member-card">

                <div class="avatar">

                    <i class="fa-solid fa-child"></i>

                </div>

                <h3>Mark Lozada</h3>

                <span>Son</span>

            </div>

            <div class="member-card">

                <div class="avatar">

                    <i class="fa-solid fa-child-dress"></i>

                </div>

                <h3>Jane Lozada</h3>

                <span>Daughter</span>

            </div>

            <div class="member-card">

                <div class="avatar">

                    <i class="fa-solid fa-baby"></i>

                </div>

                <h3>Baby Lozada</h3>

                <span>Youngest Child</span>

            </div>

        </div>

    </section>

</body>

</html>
